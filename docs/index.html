<!DOCTYPE html>

<html>
<head>
    <title>Clock</title>
<script>
function startTime() {
	var width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
	
    var today = new Date();
    var h = today.getHours();
    var m = today.getMinutes();
    var s = today.getSeconds();
	var sPrint = "";
    var d = today.getDate();
    var w = today.getDay();
    var day = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
	var curDay = day[w];
    m = checkTime(m);
    // s = checkTime(s);

	// custom (abuse of braille as a) second counter
	if (s < 7.5) {sPrint = "⠈";}
	else if (s < 15) {sPrint = "⠘";}
	else if (s < 22.5) {sPrint = "⠸";}
	else if (s < 30) {sPrint = "⢸";}
	else if (s < 37.5) {sPrint = "⣸";}
	else if (s < 45) {sPrint = "⣼";}
	else if (s < 52.5) {sPrint = "⣾";}
	else {sPrint = "⣿";}

	if (h < 7) { // additional conversion for day of week
		if (w == 0) {curDay = day[6];}
		else {curDay = day[w - 1];}
		d--;
	};

	if (width == 891 || width == 758) {h -= 7;}; // HARDCODED CONVERSION TO GMT -7 (PDT); WILL BE INACCURATE ON OTHER TIMEZONES

	if (h < 0) {h += 24};
	
    var sep = getSep(h);  // use sep to indicate am/pm.
    if (h > 12) {h -= 12};  // use 12-hour clock
    if (h == 0) {h = 12};

	h = checkTime(h); // need to move it *after* the conversion

    
    var theTime = h + ":" + m + "\n\n" + sPrint;
    var theDate = curDay + '&nbsp;' + d;
    var theHour = sep;
   
    
    document.getElementById('text').innerHTML = theTime;
    document.getElementById('date').innerHTML = theDate;
    document.getElementById('hour').innerHTML = theHour;
    document.getElementById('debug').innerHTML = width + " ⠒";
    var t = setTimeout(startTime, 100);  // smooth repeat
}
function checkTime(i) {
    if (i < 10) {i = "0" + i};  // add zero in front of numbers < 10
    return i;
}
function getSep(h) {
    var sep = 'AM';
    if (h >= 12) {sep = 'PM'};  // use ':' for pm values, '.' for am
    return sep;
}
</script>
</head>

<body onload="startTime()" style="background-color:black;">
<div id="date" style="color:#ffffff; font-family:sans-serif;
		  font-size:100px; text-align:center; 
		  padding-top:120px; padding-right:120px;"></div>
<div id="text" style="color:#ffffff; font-family:sans-serif; 
		 font-size:256px; text-align:right; 
		  line-height:0.8; padding-right:120px;"></div>
<div id="hour" style="color:#aaaaaa; font-family:sans-serif; 
font-size:100px; text-align:left; 
 line-height:0.8;"></div>
 <div id="debug" style="color:#ffffff; font-family:sans-serif; font-size:50px; text-align:left;"></div>
</body>
</html>
